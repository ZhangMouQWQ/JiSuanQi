<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>A股查询 - 以600416测试</title>
	<style>
		body{font-family:Arial,Helvetica,sans-serif;margin:18px}
		label{display:inline-block;width:70px}
		input,button{padding:6px;margin:4px}
		pre{background:#f7f7f7;padding:10px}
	</style>
</head>
<body>
	<h3>A股即时行情查询（示例：600416）</h3>
	<div>
		<label>股票代码</label>
		<input id="code" value="600416" />
	</div>
	<div>
		<label>日期</label>
		<input id="date" type="date" />
	</div>
	<div>
		<button id="query">查询</button>
		<small>提示：此页面优先获取当日（实时）行情；历史日线数据可能受第三方接口限制。</small>
	</div>

	<h4>结果</h4>
	<pre id="result">（等待查询）</pre>

	<script>
		// 默认日期为今天
		(function(){
			const d = new Date();
			const yyyy = d.getFullYear();
			const mm = String(d.getMonth()+1).padStart(2,'0');
			const dd = String(d.getDate()).padStart(2,'0');
			document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
		})();

		function prefixFor(code){
			// 简单规则：以6开头为上交所(sh)，其它视为深交所(sz)
			return code && code[0]==='6' ? 'sh' : 'sz';
		}

		function show(msg){ document.getElementById('result').textContent = msg; }

		document.getElementById('query').addEventListener('click', function(){
			const code = (document.getElementById('code').value||'').trim();
			const date = document.getElementById('date').value;
			if(!/^[0-9]+$/.test(code)){ show('请输入纯数字的股票代码，例如 600416'); return; }
			const pref = prefixFor(code);
			const today = new Date();
			const sel = new Date(date);
			// 仅当选择的是今天才请求新浪实时接口（通过动态script可跨域获取变量）
			if(sel.toDateString() === today.toDateString()){
				show('正在获取实时行情...');
				const varName = 'hq_str_' + pref + code;
				// 移除旧的全局变量（如果有）
				try{ window[varName] = undefined; }catch(e){}
				const url = 'https://hq.sinajs.cn/list=' + pref + code;
				const s = document.createElement('script');
				s.src = url;
				s.onload = function(){
					try{
						const raw = window[varName];
						if(!raw){ show('未返回数据，可能接口被限制或代码错误。'); return; }
						// raw 格式: "名称,今开,昨收,当前,最高,最低,买盘,卖盘,成交量,成交额,...,时间"
						const parts = raw.split(',');
						const lines = [];
						lines.push('代码: ' + pref + code);
						lines.push('名称: ' + (parts[0]||''));
						lines.push('今开: ' + (parts[1]||''));
						lines.push('昨收: ' + (parts[2]||''));
						lines.push('当前: ' + (parts[3]||''));
						lines.push('最高: ' + (parts[4]||''));
						lines.push('最低: ' + (parts[5]||''));
						lines.push('成交量(手): ' + (parts[8]||''));
						lines.push('成交额(元): ' + (parts[9]||''));
						// 尝试找到时间字段（常在第30或31位），否则显示原始
						const timeField = parts.slice(30,33).find(Boolean) || parts[31] || '';
						if(timeField) lines.push('时间: ' + timeField);
						lines.push('\n-- 原始返回 --\n' + raw);
						show(lines.join('\n'));
					}catch(e){ show('解析失败: '+e.message); }
					// 清理script标签
					s.remove();
				};
				s.onerror = function(){ show('请求失败，无法加载行情接口（可能被浏览器或服务端阻止）。'); s.remove(); };
				document.head.appendChild(s);
			}else{
				// 如果不是今天，说明用户想获取历史数据；尝试调用凤凰网日线接口（可能受限）
				show('请求历史日线数据: 正在尝试第三方接口（若失败可能为跨域或接口限制）...');
				const pref = prefixFor(code);
				const api = 'http://api.finance.ifeng.com/akdaily/?code=' + pref + code + '&start=' + date + '&end=' + date;
				fetch(api).then(r=>r.text()).then(txt=>{
					// 返回通常是 JSON-like，直接展示
					show('URL: ' + api + '\n\n' + txt);
				}).catch(err=>{
					show('历史数据请求失败: ' + err.message + '\n\n尝试使用当天查询获取实时数据。');
				});
			}
		});
	</script>
</body>
</html>
